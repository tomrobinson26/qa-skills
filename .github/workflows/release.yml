name: Release Skills

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package skills
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Get-ChildItem .github/skills -Directory | ForEach-Object {
            $skill = $_
            $skillMd = Join-Path $skill.FullName "SKILL.md"
            if ((Test-Path $skillMd) -and (Get-Content $skillMd -Raw) -match "(?m)^distribute:\s*true") {
              .\package-skill.ps1 $skill.FullName -OutputDir dist
            } else {
              Write-Host "Skipping $($skill.Name) (distribute: true not set)"
            }
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
