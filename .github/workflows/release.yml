name: Release Skills

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package skills
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            if [[ -f "${skill_dir}.distribute" ]]; then
              bash scripts/package-skill.sh "$skill_dir" dist
            else
              echo "Skipping $(basename "$skill_dir") (no .distribute file)"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
