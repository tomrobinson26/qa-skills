name: Release Skills

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package skills
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            if [[ -f "${skill_dir}.distribute" ]]; then
              bash scripts/package-skill.sh "$skill_dir" dist
            else
              echo "Skipping $(basename "$skill_dir") (no .distribute file)"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true

      - name: Regenerate marketplace file
        run: bash scripts/generate-marketplace.sh

      - name: Commit marketplace file to main
        run: |
          if git diff --quiet -- .claude-plugin/marketplace.json; then
            echo "marketplace.json is up to date"
            exit 0
          fi
          cp .claude-plugin/marketplace.json /tmp/marketplace.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/marketplace.json .claude-plugin/marketplace.json

          git add .claude-plugin/marketplace.json
          git commit -m "chore: regenerate marketplace.json for ${GITHUB_REF_NAME}"
          git push origin main
